<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イナズマイレブン クロス攻略Wiki</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:#f5f5f5;
}

header{
  background:#0078ff;
  color:white;
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
}

nav{
  background:white;
  display:flex;
  justify-content:center;
  gap:20px;
  padding:15px;
  box-shadow:0 2px 5px rgba(0,0,0,.1);
}

nav a{
  text-decoration:none;
  color:#0078ff;
  font-weight:bold;
}

.container{
  max-width:1100px;
  margin:20px auto;
  display:grid;
  grid-template-columns:250px 1fr;
  gap:20px;
  padding:10px;
}

.sidebar,.content{
  background:white;
  border-radius:10px;
  padding:20px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.menu{
  list-style:none;
}

.menu li{
  padding:12px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.menu li:hover{
  background:#f0f6ff;
}

.card{
  border:1px solid #ddd;
  border-radius:10px;
  padding:15px;
  margin-bottom:15px;
  background:white;
}

.card h3{
  color:#0078ff;
  margin-bottom:10px;
}

img{
  width:100%;
  max-width:900px;
  height:auto;
  display:block;
}

#tierArea,
#calendarArea,
#trainingArea{
  display:none;
}

footer{
  background:#222;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:30px;
}

@media(max-width:768px){
  .container{
    grid-template-columns:1fr;
  }

  nav{
    flex-wrap:wrap;
  }
}
</style>

</head>

<body>

<header>
⚡ イナズマイレブン クロス攻略Wiki
</header>

<nav>
<a href="#">最新情報</a>
<a href="#">ストーリー</a>
<a href="#">掲示板</a>
</nav>

<div class="container">

<!-- サイド -->
<div class="sidebar">

<h2>攻略メニュー</h2>

<ul class="menu">

<li onclick="goHome()">🏠 トップ</li>
<li onclick="showTier()">🏆 選手Tier表</li>
<li onclick="showCalendar()">📅 試練カレンダー</li>
<li onclick="showTraining()">📘 育成ガイド</li>

</ul>

</div>

<!-- メイン -->
<div class="content">

<!-- HOME -->
<div id="homeArea">

<div class="card">
<h3>最新情報</h3>
<p>イナズマイレブン クロス攻略Wiki制作中！</p>
</div>

<!-- ★ここにシミュレーター入れた -->
<div class="card">
<h3>シミュレーター</h3>

<iframe
  src="https://inacro-note.com/"
  style="width:100%; height:700px; border:none;">
</iframe>

<br><br>

<a href="https://inacro-note.com/" target="_blank">
  別タブで開く
</a>

</div>

</div>

<!-- Tier -->
<div id="tierArea">
<div class="card">
<h3>選手Tier表</h3>
<img src="IMG_8889.jpeg">
<br><br>
<button onclick="goHome()">ホームに戻る</button>
</div>
</div>

<!-- 試練カレンダー -->
<div id="calendarArea">
<div class="card">
<h3>試練カレンダー</h3>
<img src="IMG_8887.jpeg">
<br><br>
<button onclick="goHome()">ホームに戻る</button>
</div>
</div>

<!-- 育成ガイド -->
<div id="trainingArea">
<div class="card">
<h3>育成ガイド①</h3>
<img src="IMG_8904.jpeg">
</div>

<div class="card">
<h3>育成ガイド②</h3>
<img src="IMG_8903.jpeg">
</div>

<div class="card">
<h3>育成ガイド③</h3>
<img src="IMG_8902.jpeg">
</div>

<div class="card">
<h3>育成ガイド④</h3>
<img src="IMG_8900.jpeg">
</div>

<br>
<button onclick="goHome()">ホームに戻る</button>
</div>

</div>

<footer>
© 2026 イナズマイレブン クロス攻略Wiki
</footer>

<script>

function showTier() {
  document.getElementById("tierArea").style.display = "block";
  document.getElementById("calendarArea").style.display = "none";
  document.getElementById("trainingArea").style.display = "none";
  document.getElementById("homeArea").style.display = "none";
}

function showCalendar() {
  document.getElementById("calendarArea").style.display = "block";
  document.getElementById("tierArea").style.display = "none";
  document.getElementById("trainingArea").style.display = "none";
  document.getElementById("homeArea").style.display = "none";
}

function showTraining() {
  document.getElementById("trainingArea").style.display = "block";
  document.getElementById("tierArea").style.display = "none";
  document.getElementById("calendarArea").style.display = "none";
  document.getElementById("homeArea").style.display = "none";
}

function goHome() {
  document.getElementById("homeArea").style.display = "block";
  document.getElementById("tierArea").style.display = "none";
  document.getElementById("calendarArea").style.display = "none";
  document.getElementById("trainingArea").style.display = "none";
}

</script>

</body>
</html>
